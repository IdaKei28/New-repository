<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>謎解き</title>
</head>

<body>

<h1>謎解き問題</h1>
<p>日本で一番高い山は？</p>

<input id="answer">
<button onclick="check()">回答</button>

<p id="result"></p>

<script>
function check(){
let ans = document.getElementById("answer").value;

if(ans === "富士山"){
document.getElementById("result").innerText = "正解！";
}else{
document.getElementById("result").innerText = "違います";
}
}
</script>

</body>
</html>
